<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Hero entrance — ground truth</title>
<style>
  :root { --t: 0s; --bg:#0d1220; --card:#18203a; --ink:#e7e9f2; --dim:#8b93ad;
           --ind:#818cf8; --cya:#22d3ee; --fuc:#e879f9; --good:#34d399; }
  * { box-sizing:border-box; margin:0; }
  html,body { width:800px; height:450px; overflow:hidden; }
  body { background:var(--bg); color:var(--ink); display:grid; place-items:center;
          font:15px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
  /* Every animated element resolves its delay against --t, so freezing is exact. */
  .a { animation-delay: calc(var(--d, 0s) - var(--t)); animation-fill-mode: both; }
  html.frozen .a { animation-play-state: paused; }
  @media (prefers-reduced-motion: reduce) { .a { animation-name: none !important; } }

  .card { width:520px; padding:38px 40px; border-radius:18px; background:var(--card);
           border:1px solid #2b3560; box-shadow:0 30px 70px -40px #000; }
  h1 { font-size:38px; letter-spacing:-.02em; }
  p { color:var(--dim); margin-top:12px; }
  .pill { display:inline-block; margin-top:22px; padding:9px 16px; border-radius:9px;
           background:var(--ind); color:#fff; font-weight:600; font-size:14px; }
  /* AUTHORED: opacity 0->1, translateY 40->0, scale .92->1 over 700ms, cubic-bezier(.16,1,.3,1) */
  .card.a { animation-name: rise; animation-duration: 700ms;
             animation-timing-function: cubic-bezier(.16,1,.3,1); }
  @keyframes rise {
    from { opacity:0; transform:translateY(40px) scale(.92); }
    to   { opacity:1; transform:translateY(0)    scale(1);   }
  }
</style></head>
<body>
  <div class="card a">
    <h1>Ship the motion.</h1>
    <p>Fade, rise and scale — one entrance, measured end to end.</p>
    <div class="pill">Get started</div>
  </div>
<script>
  var m = location.hash.match(/^#t=(\d+)/);
  if (m) {
    document.documentElement.style.setProperty('--t', m[1] + 'ms');
    document.documentElement.classList.add('frozen');
  }
</script>
</body></html>
