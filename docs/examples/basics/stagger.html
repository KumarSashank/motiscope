<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Staggered grid — ground truth</title>
<style>
  :root { --t: 0s; --bg:#0d1220; --card:#18203a; --ink:#e7e9f2; --dim:#8b93ad;
           --ind:#818cf8; --cya:#22d3ee; --fuc:#e879f9; --good:#34d399; }
  * { box-sizing:border-box; margin:0; }
  html,body { width:800px; height:450px; overflow:hidden; }
  body { background:var(--bg); color:var(--ink); display:grid; place-items:center;
          font:15px/1.5 ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; }
  /* Every animated element resolves its delay against --t, so freezing is exact. */
  .a { animation-delay: calc(var(--d, 0s) - var(--t)); animation-fill-mode: both; }
  html.frozen .a { animation-play-state: paused; }
  @media (prefers-reduced-motion: reduce) { .a { animation-name: none !important; } }

  .grid { display:grid; grid-template-columns:repeat(3,190px); gap:18px; }
  .c { height:120px; border-radius:14px; background:var(--card); border:1px solid #2b3560;
        display:flex; flex-direction:column; justify-content:center; padding:0 20px; gap:10px; }
  .c b { color:var(--cya); font:600 13px ui-monospace,monospace; }
  .c span { display:block; height:8px; width:70%; border-radius:4px; background:#33406f; }
  /* AUTHORED: 6 cards, fade+rise 500ms each, 120ms apart, left-to-right */
  .c.a { animation-name: pop; animation-duration: 500ms;
          animation-timing-function: cubic-bezier(.16,1,.3,1); }
  @keyframes pop {
    from { opacity:0; transform:translateY(26px); }
    to   { opacity:1; transform:translateY(0);    }
  }
</style></head>
<body>
  <div class="grid">
    <div class="c a" style="--d:0ms"><b>01</b><span></span></div>
    <div class="c a" style="--d:120ms"><b>02</b><span></span></div>
    <div class="c a" style="--d:240ms"><b>03</b><span></span></div>
    <div class="c a" style="--d:360ms"><b>04</b><span></span></div>
    <div class="c a" style="--d:480ms"><b>05</b><span></span></div>
    <div class="c a" style="--d:600ms"><b>06</b><span></span></div>
  </div>
<script>
  var m = location.hash.match(/^#t=(\d+)/);
  if (m) {
    document.documentElement.style.setProperty('--t', m[1] + 'ms');
    document.documentElement.classList.add('frozen');
  }
</script>
</body></html>
