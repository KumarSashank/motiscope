    <polygon points="200.0,400.0 400.0,400.0 300.0,500.0" fill="#FBE3B8" class="pulse-b" style="transform-origin:300.0px 400.0px"/>
    <polygon points="200.0,600.0 400.0,600.0 300.0,500.0" fill="#F2584B" class="pulse-b" style="transform-origin:300.0px 600.0px"/>
    <polygon points="200.0,400.0 200.0,600.0 300.0,500.0" fill="#17A2A2" class="pulse-a" style="transform-origin:200.0px 500.0px"/>
    <polygon points="400.0,400.0 400.0,600.0 300.0,500.0" fill="#37244F" class="pulse-a" style="transform-origin:400.0px 500.0px"/>
  </g>
  <g clip-path="url(#k22)" style="--stag:0.082s">
    <rect x="400" y="400" width="200" height="200" fill="#37244F" class="bg4"/>
    <circle cx="500" cy="500" r="145" fill="#17A2A2" class="ring" style="transform-origin:500.0px 500.0px;--d:-2.25s"/>
    <circle cx="500" cy="500" r="145" fill="#FBF8F1" class="ring" style="transform-origin:500.0px 500.0px;--d:-1.5s"/>
