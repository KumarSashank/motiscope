    <circle cx="500" cy="500" r="145" fill="#37244F" class="ring" style="transform-origin:500.0px 500.0px;--d:0.0s"/>
  </g>
  <g clip-path="url(#k23)" style="--stag:0.082s">
    <rect x="600" y="400" width="200" height="200" fill="#F2584B"/>
    <circle cx="600" cy="400" r="118" fill="#F5B335" class="pulse-a" style="transform-origin:600.0px 400.0px"/>
    <circle cx="800" cy="400" r="118" fill="#FBE3B8" class="pulse-b" style="transform-origin:800.0px 400.0px"/>
